# Configuração Nginx - ClickAgenda (clickagenda.online)
#
# Instalação no servidor:
#   1. Copie o build do frontend (frontend/dist) para /var/www/clickagenda
#   2. Copie este arquivo para /etc/nginx/sites-available/clickagenda
#   3. sudo ln -s /etc/nginx/sites-available/clickagenda /etc/nginx/sites-enabled/
#   4. sudo nginx -t && sudo systemctl reload nginx
#   5. Configure HTTPS com Certbot (se ainda não tiver):
#        sudo certbot --nginx -d clickagenda.online -d www.clickagenda.online

server {
    listen 80;
    server_name clickagenda.online www.clickagenda.online;

    # Frontend (build estático do Vite/React)
    root /var/www/clickagenda;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Uploads (logos, fotos de clientes, evoluções, cases)
    location /uploads/ {
        alias /opt/clickagenda/uploads/;
    }

    # Proxy reverso para o backend Spring Boot
    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /auth/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    client_max_body_size 10M;
}
