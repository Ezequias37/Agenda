# =====================================================
# Profile opcional para desenvolvimento local sem MySQL instalado.
# Ative com: mvn spring-boot:run -Dspring-boot.run.profiles=h2
# (ou -Dspring.profiles.active=h2 ao rodar o jar)
# =====================================================
spring.datasource.url=jdbc:h2:file:./data/agenda_db;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
