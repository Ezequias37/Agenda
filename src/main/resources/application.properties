spring.application.name=agenda

# Banco H2 em arquivo (persiste entre restarts)
spring.datasource.url=jdbc:h2:file:./data/agenda_db;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Configuração do Hibernate/JPA
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# =====================================================
# Email - Gmail SMTP
# 1. Ative a verificação em 2 etapas em myaccount.google.com
# 2. Gere uma "Senha de App" em: myaccount.google.com/apppasswords
# Em produção, defina as variáveis de ambiente:
#   SPRING_MAIL_USERNAME e SPRING_MAIL_PASSWORD
# =====================================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SPRING_MAIL_USERNAME:SEU_EMAIL@gmail.com}
spring.mail.password=${SPRING_MAIL_PASSWORD:SENHA_APP_AQUI}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
app.mail.from=${SPRING_MAIL_USERNAME:SEU_EMAIL@gmail.com}

# JWT
app.jwt.secret=${APP_JWT_SECRET:lmbronze-agenda-super-secret-key-256bits-ok}
app.jwt.expiration=86400000

# =====================================================
# Google OAuth2
# Configure no Google Cloud Console: console.cloud.google.com
# Em produção, defina as variáveis de ambiente:
#   GOOGLE_CLIENT_ID e GOOGLE_CLIENT_SECRET
# URI autorizada de redirecionamento no Google Console:
#   https://SEU_DOMINIO/login/oauth2/code/google
# =====================================================
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:configure-no-google-console}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:configure-no-google-console}
spring.security.oauth2.client.registration.google.scope=email,profile

# URL do frontend (para redirecionamento após login Google)
app.frontend.url=${APP_FRONTEND_URL:http://localhost:5173}

# CORS - origens permitidas
app.cors.allowed-origins=${APP_CORS_ORIGINS:http://localhost:5173,http://localhost:5174,http://localhost:5175}
