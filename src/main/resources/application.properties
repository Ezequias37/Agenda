spring.application.name=agenda

# =====================================================
# Banco de dados - MySQL (produção)
# Defina as variáveis de ambiente abaixo em produção:
#   DB_URL, DB_USERNAME, DB_PASSWORD
# Para desenvolvimento local sem MySQL instalado, rode com o profile "h2":
#   mvn spring-boot:run -Dspring-boot.run.profiles=h2
# =====================================================
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/clickagenda?useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuração do Hibernate/JPA
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# =====================================================
# Upload de arquivos (logo da empresa, fotos, evoluções, cases de sucesso)
# Todos os uploads ficam sob este diretório base, em subpastas por tipo:
#   uploads/logos, uploads/clientes, uploads/evolucoes,
#   uploads/casos-originais e uploads/casos (imagem final gerada).
# As subpastas são criadas automaticamente quando necessário.
# =====================================================
app.upload.dir=${APP_UPLOAD_DIR:uploads}
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# =====================================================
# Email - Gmail SMTP
# 1. Ative a verificação em 2 etapas em myaccount.google.com
# 2. Gere uma "Senha de App" em: myaccount.google.com/apppasswords
# Em produção, defina as variáveis de ambiente:
#   SPRING_MAIL_USERNAME e SPRING_MAIL_PASSWORD
# =====================================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SPRING_MAIL_USERNAME:SEU_EMAIL@gmail.com}
spring.mail.password=${SPRING_MAIL_PASSWORD:SENHA_APP_AQUI}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
app.mail.from=${SPRING_MAIL_USERNAME:SEU_EMAIL@gmail.com}

# =====================================================
# WhatsApp - Z-API (https://www.z-api.io)
# 1. Crie uma instância no painel da Z-API e conecte seu WhatsApp.
# 2. Defina as variáveis de ambiente em produção:
#    ZAPI_INSTANCE_ID, ZAPI_TOKEN, ZAPI_CLIENT_TOKEN
# 3. Só ative o envio (APP_ZAPI_ENABLED=true) depois de configurar as
#    credenciais acima — enquanto desativado, os métodos do WhatsAppService
#    não fazem nada (não quebram o fluxo de agendamento).
# =====================================================
app.zapi.enabled=${APP_ZAPI_ENABLED:false}
app.zapi.base-url=${ZAPI_BASE_URL:https://api.z-api.io}
app.zapi.instance-id=${ZAPI_INSTANCE_ID:}
app.zapi.token=${ZAPI_TOKEN:}
app.zapi.client-token=${ZAPI_CLIENT_TOKEN:}

# =====================================================
# Financeiro - PIX via Asaas (https://www.asaas.com)
# 1. Crie uma conta (sandbox ou produção) e gere uma API Key.
# 2. Configure um webhook no painel Asaas apontando para:
#      {SEU_DOMINIO}/api/pagamentos/webhook/asaas
#    com "Token de autenticação" igual ao valor de ASAAS_WEBHOOK_TOKEN.
# 3. Só ative (APP_ASAAS_ENABLED=true) depois de configurar tudo acima —
#    enquanto desativado, os agendamentos são criados normalmente, apenas
#    sem gerar cobrança PIX.
# =====================================================
app.asaas.enabled=${APP_ASAAS_ENABLED:false}
app.asaas.base-url=${ASAAS_BASE_URL:https://sandbox.asaas.com/api/v3}
app.asaas.api-key=${ASAAS_API_KEY:}
app.asaas.webhook-token=${ASAAS_WEBHOOK_TOKEN:}

# JWT
app.jwt.secret=${APP_JWT_SECRET:lmbronze-agenda-super-secret-key-256bits-ok}
app.jwt.expiration=86400000

# URL do frontend
app.frontend.url=${APP_FRONTEND_URL:http://localhost:5173}

# CORS - origens permitidas (separadas por vírgula)
app.cors.allowed-origins=${APP_CORS_ORIGINS:http://localhost:5173,http://localhost:5174,http://localhost:5175,http://clickagenda.online,https://clickagenda.online,http://www.clickagenda.online,https://www.clickagenda.online}
